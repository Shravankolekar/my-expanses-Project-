<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Expense</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background-image:url('https://images.unsplash.com/photo-1554224155-6726b3ff858f');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    padding:20px;
    padding-top:100px;
}

/* =======================
   NAVBAR
======================= */

.navbar{
    position:fixed;
    top:0;
    left:0;

    width:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:15px 40px;

    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);

    z-index:1000;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    gap:10px;
}

.logout-btn{
    text-decoration:none;
    color:white;

    padding:10px 18px;

    border-radius:10px;

    background:linear-gradient(135deg,#ff416c,#ff4b2b);

    transition:0.3s;
}

.logout-btn:hover{
    transform:translateY(-2px);
}

/* =======================
   DELETE CARD
======================= */

.delete-container{

    width:100%;
    max-width:450px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);

    padding:30px;

    border-radius:20px;

    box-shadow:0 5px 25px rgba(0,0,0,0.3);
}

.delete-container h1{
    text-align:center;
    color:white;
    margin-bottom:25px;
    font-size:30px;
}

form{
    display:flex;
    flex-direction:column;
}

label{
    color:white;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;

    border:1px solid rgba(255,255,255,0.4);
    border-radius:12px;

    background:transparent;
    color:white;

    outline:none;

    margin-bottom:20px;
}

input::placeholder{
    color:#ddd;
}

input:focus{
    border-color:#4facfe;
    box-shadow:0 0 8px rgba(79,172,254,0.5);
}

button{
    width:100%;

    padding:14px;

    border:none;
    border-radius:12px;

    background:linear-gradient(135deg,#ff416c,#ff4b2b);

    color:white;

    font-size:16px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.error{
    text-align:center;
    color:#ff0000;
    margin-top:15px;
}

.msg{
    text-align:center;
    color:#00ff44;
    margin-top:15px;
}

/* =======================
   TABLET
======================= */

@media(max-width:768px){

    body{
        padding-top:160px;
    }

    .navbar{
        flex-direction:column;
        gap:15px;
        padding:15px;
    }

    .logo{
        font-size:20px;
        text-align:center;
    }

    .nav-links{
        width:100%;
        justify-content:center;
        flex-wrap:wrap;
    }

    .logout-btn{
        flex:1;
        text-align:center;
    }
}

/* =======================
   MOBILE
======================= */

@media(max-width:480px){

    body{
        padding-top:180px;
    }

    .delete-container{
        padding:25px 18px;
    }

    .delete-container h1{
        font-size:24px;
    }

    input{
        padding:12px;
        font-size:14px;
    }

    button{
        padding:12px;
        font-size:14px;
    }

    .logo{
        font-size:18px;
    }

    .nav-links{
        flex-direction:column;
        width:100%;
    }

    .logout-btn{
        width:100%;
    }
}

</style>

</head>

<body>

<!-- Navbar -->

<div class="navbar">

    <div class="logo">
        Expense Tracker Delete Data
    </div>

    <div class="nav-links">

        <a href="{% url 'dashbord' %}" class="logout-btn">
            Dashboard
        </a>

        <a href="{% url 'showalldata' %}" class="logout-btn">
            Show Data
        </a>

        <a href="{% url 'login' %}" class="logout-btn">
            Logout
        </a>

    </div>

</div>

<!-- Delete Form -->

<div class="delete-container">

    <h1>Delete Expense</h1>

    <form method="POST">

        {% csrf_token %}

        <label>Expense ID</label>

        <input
            type="number"
            name="id"
            placeholder="Enter Expense ID"
            required
        >

        <button type="submit">
            Delete Expense
        </button>

        {% if error %}
            <p class="error">
                <b>{{ error }}</b>
            </p>
        {% endif %}

        {% if mag %}
            <p class="msg">
                <b>{{ mag }}</b>
            </p>
        {% endif %}

    </form>

</div>

</body>
</html>
