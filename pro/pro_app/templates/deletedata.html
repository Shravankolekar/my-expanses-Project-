<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Expense</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            width: 100%;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            /* Background Image */
            background-image: url('https://images.unsplash.com/photo-1554224155-6726b3ff858f');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            padding: 15px;
        }

        .delete-container{

            width: 100%;
            max-width: 420px;

            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);

            padding: 30px 25px;

            border-radius: 20px;

            box-shadow: 0px 5px 25px rgba(0,0,0,0.3);

        }

        .delete-container h1{
            text-align: center;
            color: white;
            margin-bottom: 25px;
            font-size: 28px;
        }

        form{
            display: flex;
            flex-direction: column;
        }

        label{
            color: white;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input{

            width: 100%;
            padding: 14px;

            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 12px;

            background: transparent;
            color: white;

            outline: none;

            margin-bottom: 20px;

            font-size: 15px;
        }

        input::placeholder{
            color: #e0e0e0;
        }

        input:focus{
            border-color: #4facfe;
            box-shadow: 0px 0px 8px rgba(79,172,254,0.5);
        }

        button{

            width: 100%;
            padding: 14px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(135deg,#ff416c,#ff4b2b);

            color: white;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover{
            transform: scale(1.02);
            opacity: 0.9;
        }

        .error{
            text-align: center;
            color: #ffcccb;
            margin-top: 15px;
            font-size: 15px;
        }

        /* Mobile Responsive */

        @media(max-width:480px){

            .delete-container{
                padding: 25px 18px;
            }

            .delete-container h1{
                font-size: 24px;
            }

            input{
                padding: 12px;
                font-size: 14px;
            }

            button{
                padding: 12px;
                font-size: 15px;
            }

        }

    </style>

</head>
<body>

    <div class="delete-container">

        <h1>Delete Expense</h1>

        <form action="" method="POST">

            {% csrf_token %}

            <label>Sr No</label>

            <input
                type="number"
                name="id"
                placeholder="Enter Expense ID to Delete"
                required
            >

            <button type="submit">
                Delete Expense
            </button>

            {% if error %}
                <p class="error">
                    <b>{{ error }}</b>
                </p>
            {% endif %}

        </form>

    </div>

</body>
</html>
