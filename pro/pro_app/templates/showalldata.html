<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show All Data</title>
</head>
<body>
    <table>
        <thead>
        <tr>
            <th>Sr No</th>
            <th>Category Name</th>
            <th>Note</th>
            <th>Expance Date</th>
            <th>Payment Method</th>
            <th>Amount</th>
        </tr>
        </thead>
        <tbody>
            {% for d in data %}
            
                <tr>
                    <td>{{d.id}}</td>
                    <td>{{d.category}}</td>
                    <td>{{d.note}}</td>
                    <td>{{d.expense_date}}</td>
                    <td>{{d.payment_method}}</td>
                    <td>{{d.amount}}</td>
                </tr>
            
            {% endfor %}
        </tbody>
    </table>
    
</body>
</html>
