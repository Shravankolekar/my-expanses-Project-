<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:url("https://images.unsplash.com/photo-1554224155-6726b3ff858f")
            no-repeat center center/cover;

            padding:100px 15px 20px;
        }

        /* Navbar */

        .navbar{
            width:100%;

            position:fixed;
            top:0;
            left:0;

            background:rgba(0,0,0,0.4);
            backdrop-filter:blur(10px);

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:15px 30px;

            z-index:1000;
        }

        .logo{
            color:white;
            font-size:24px;
            font-weight:bold;
        }

        .nav-links{
            display:flex;
            gap:10px;
        }

        .nav-btn{
            text-decoration:none;

            color:white;

            background:#2563eb;

            padding:10px 18px;

            border-radius:8px;

            transition:.3s;
        }

        .nav-btn:hover{
            background:#1d4ed8;
        }

        .logout-btn{
            background:#ef4444;
        }

        .logout-btn:hover{
            background:#dc2626;
        }

        /* Form Container */

        .form-container{

            width:100%;
            max-width:500px;

            padding:30px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(15px);
            -webkit-backdrop-filter:blur(15px);

            border-radius:20px;

            border:1px solid rgba(255,255,255,0.2);

            box-shadow:0 8px 32px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:white;
            margin-bottom:25px;
        }

        label{
            display:block;
            color:white;
            font-weight:bold;
            margin-top:15px;
            margin-bottom:6px;
        }

        input,
        select{

            width:100%;

            padding:12px;

            border:none;
            border-radius:10px;

            outline:none;

            font-size:16px;
        }

        button{

            width:100%;

            padding:13px;

            margin-top:20px;

            border:none;
            border-radius:10px;

            background:#22c55e;

            color:white;

            font-size:18px;
            font-weight:bold;

            cursor:pointer;

            transition:.3s;
        }

        button:hover{
            background:#16a34a;
        }

        .message{
            text-align:center;
            margin-top:15px;
            color:white;
            font-weight:bold;
        }

        /* Mobile Responsive */

        @media(max-width:768px){

            .navbar{
                flex-direction:column;
                gap:10px;
                padding:12px;
            }

            .logo{
                font-size:20px;
                text-align:center;
            }

            .nav-links{
                width:100%;
                justify-content:center;
                flex-wrap:wrap;
            }

            .nav-btn{
                padding:8px 15px;
                font-size:14px;
            }

            .form-container{
                padding:20px;
            }

            h1{
                font-size:24px;
            }

            input,
            select,
            button{
                font-size:15px;
            }
        }

    </style>

</head>

<body>

    <!-- Navbar -->

    <div class="navbar">

        <div class="logo">
            Expense Tracker Add Expancess
        </div>

        <div class="nav-links">

            <a href="{% url 'dashbord' %}" class="nav-btn">
                Dashboard
            </a>

            <a href="{% url 'showalldata' %}" class="nav-btn">
                View Expenses
            </a>

            <a href="{% url 'login' %}" class="nav-btn logout-btn">
                Logout
            </a>

        </div>

    </div>

    <!-- Form -->

    <div class="form-container">

        <h1>Add Expense</h1>

        <form action="" method="POST">

            {% csrf_token %}

            <label>Category Name</label>

            <select name="category" required>

                <option value="">Select Category</option>

                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Friend">Friend</option>
                <option value="Shopping">Shopping</option>
                <option value="Home">Home</option>

            </select>

            <label>Amount</label>

            <input
                type="number"
                name="amount"
                placeholder="Enter Amount"
                required
            >

            <label>Note</label>

            <input
                type="text"
                name="note"
                placeholder="Enter Additional Information"
                required
            >

            <label>Payment Method</label>

            <select name="payment_method" required>

                <option value="">Select Payment Method</option>

                <option value="Credit Card">Credit Card</option>
                <option value="Cash">Cash</option>
                <option value="Google Pay">Google Pay</option>
                <option value="PhonePe">PhonePe</option>
                <option value="Paytm">Paytm</option>

            </select>

            <button type="submit">
                Add Expense
            </button>

        </form>

        {% if error %}
            <div class="message">
                {{ error }}
            </div>
        {% endif %}

    </div>

</body>
</html>
