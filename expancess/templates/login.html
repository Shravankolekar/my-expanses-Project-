<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker Login</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            min-height: 100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-card{
            width:100%;
            max-width:400px;
            background:white;
            border-radius:20px;
            padding:35px 25px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.3);
        }

        .app-title{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
            color:#0f172a;
        }

        .form-control{
            height:50px;
            border-radius:12px;
        }

        .btn-login{
            width:100%;
            height:50px;
            border-radius:12px;
            background:#2563eb;
            border:none;
            font-size:18px;
            font-weight:bold;
        }

        .btn-login:hover{
            background:#1d4ed8;
        }

        .mobile-text{
            text-align:center;
            margin-top:15px;
            font-size:14px;
            color:gray;
        }

        @media(max-width:576px){

            .login-card{
                padding:25px 18px;
                border-radius:15px;
            }

            .app-title{
                font-size:24px;
            }
        }

    </style>
</head>
<body>

    <div class="login-card">

        <h2 class="app-title">Expense Tracker</h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <input type="text"
                       class="form-control"
                       placeholder="Enter Username"
                       name="user_email">
            </div>

            <div class="mb-3">
                <input type="password"
                       class="form-control"
                       placeholder="Enter Password"
                       name="passworde">
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                Login
            </button>

        </form>

        <div class="mobile-text">
            Mobile Friendly Expense Management
        </div>

    </div>

</body>
</html>
